"CS2 Dashboard GSI"
{
    "uri"           "http://localhost:8000/gsi"
    "timeout"       "5.0"
    "buffer"        "0.1"
    "throttle"      "0.5"
    "heartbeat"     "10.0"
    "auth"
    {
        "token" "cs2dashboard_secret"
    }
    "data"
    {
        "provider"            "1"
        "map"                 "1"
        "map_round_wins"      "1"
        "player_id"           "1"
        "player_state"        "1"
        "player_weapons"      "1"
        "player_match_stats"  "1"
        "round"               "1"
        "allplayers_id"       "0"
        "allplayers_state"    "0"
        "allplayers_match_stats" "0"
        "bomb"                "1"
        "grenades"            "1"
        "phase_countdowns"    "1"
    }
}
